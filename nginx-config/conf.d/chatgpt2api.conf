#3. chatgpt2api 反代
server {
    listen 443 ssl;
    listen 443 quic;
    server_name your_domain.com; # 提示：请替换为你的真实域名

    # 提示：请替换为你的 SSL 证书绝对路径
    ssl_certificate      /path/to/your/cert.crt;
    ssl_certificate_key  /path/to/your/private.key;

    # 1. 允许上传大文件（已添加）
    client_max_body_size 50m;

    # 2. 告诉浏览器支持 HTTP/3 (QUIC)
    add_header Alt-Svc 'h3=":443"; ma=86400';

	# 核心路由：代理到本地的 Docker 容器 13080 端口
    location / {
        proxy_pass http://127.0.0.1:13080;
        
    # 基础代理请求头
		proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 3. 支持 WebSocket (很多 AI 前端 UI 需要用它来流式输出或同步状态)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 4. 延长超时时间 (极度重要！AI 画图经常超过 Nginx 默认的 60 秒)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;

        # 关闭缓冲，有助于流式数据（打字机效果）更快显示
        proxy_buffering off;
    }
}

# 80 转 443
server {
    listen 80;
    server_name your_domain.com; # 提示：请替换为你的真实域名
    return 301 https://$host$request_uri;
}