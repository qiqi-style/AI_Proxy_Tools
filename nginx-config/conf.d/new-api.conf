#1. new-api反代，根路径
server {
    listen 443 ssl;
    listen 443 quic reuseport; # 注意：如果多站点都加了 reuseport 导致 Nginx 报错，可以去掉这里的 reuseport
    server_name your_domain.com; # 提示：请替换为你的真实域名

    # 提示：请替换为你的 SSL 证书绝对路径
    ssl_certificate      /path/to/your/cert.crt;
    ssl_certificate_key  /path/to/your/private.key;

    # 1. 允许大文件上传（多模态模型传图必备）
    client_max_body_size 50m;
    
    # 2. 告诉浏览器支持 HTTP/3 (QUIC)，配合 listen 443 quic 使用
    add_header Alt-Svc 'h3=":443"; ma=86400';
    
    # 3. 预防 HTTP/HTTPS 混合内容报错
    add_header Content-Security-Policy "upgrade-insecure-requests";

    # 通用代理设置
    location / {
        proxy_pass http://127.0.0.1:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 4. 支持 WebSocket 和流式（Stream）输出不中断
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 5. 延长超时时间（非常重要：有些大模型回复极慢，或者画图接口要等很久，防止 504 报错）
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        
        # 关闭缓冲，保证打字机效果丝滑输出
        proxy_buffering off;
    }
}

# 80 转 443
server {
    listen 80;
    server_name your_domain.com; # 提示：请替换为你的真实域名
    return 301 https://$host$request_uri;
}