#2. cli_proxy 反代
server {
    listen 443 ssl;
    listen 443 quic;
    server_name your_domain.com; # 提示：请替换为你的真实域名

    # 提示：请替换为你的 SSL 证书绝对路径
    ssl_certificate      /path/to/your/cert.crt;
    ssl_certificate_key  /path/to/your/private.key;

    # === 全局通用优化设置 (下面所有的 location 都会自动继承) ===
    
    # 1. 允许大文件/图片上传 (多模态必备)
    client_max_body_size 50m;
    
    # 2. 声明 HTTP/3 (QUIC) 支持
    add_header Alt-Svc 'h3=":443"; ma=86400';
    add_header Content-Security-Policy "upgrade-insecure-requests";

    # 3. 基础代理头
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 4. WebSocket 支持
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # 5. 超长超时时间 (防止 Claude 3 Opus 或 GPT-4 思考太久导致 504)
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 60s;
    
    # 6. 关闭缓冲，确保打字机流式输出丝滑
    proxy_buffering off;


    # === 核心路由区 ===

    # 1. 主 API 接口 (8317)
    location / {
        proxy_pass http://127.0.0.1:8317;
    }

    # 2. Gemini OAuth & 管理 (8085)
    location /v1/gemini/ {
        proxy_pass http://127.0.0.1:8085/;
    }

    # 3. OpenAI / Codex OAuth (1455)
    location /v1/openai/ {
        proxy_pass http://127.0.0.1:1455/;
    }

    # 4. Claude OAuth (54545)
    location /v1/claude/ {
        proxy_pass http://127.0.0.1:54545/;
    }

    # 5. iFlow OAuth (11451)
    location /v1/iflow/ {
        proxy_pass http://127.0.0.1:11451/;
    }

    # 6. Antigravity OAuth (51121)
    location /v1/antigravity/ {
        proxy_pass http://127.0.0.1:51121/;
    }
}

# 80 转 443
server {
    listen 80;
    server_name your_domain.com; # 提示：请替换为你的真实域名
    return 301 https://$host$request_uri;
}